name: Check for broken links

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 3am
    - cron: '0 3 * * 0'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.html' './**/*.md'
          # Optionally exclude external URLs if you want to avoid rate limiting
          args: --exclude "https://github.com/*" --verbose --no-progress './**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}