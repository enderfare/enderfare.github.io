name: Update sitemap

on:
  schedule:
    - cron: '0 5 * * *'   # daily at 5am
  workflow_dispatch:

permissions:
  contents: write   # <-- required for pushing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://enderfare.github.io/website   # change to your actual URL
          # Optional: exclude certain paths
          exclude-paths: "media/**,projects/**"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "Update sitemap"
          git push
        env:
          # The remote URL is set via the checkout action, but we need to re-authenticate
          # Actually the checkout@v4 already checks out with the token, but the push may still fail.
          # The safest is to set the remote explicitly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}