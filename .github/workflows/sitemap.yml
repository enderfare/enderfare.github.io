name: Update sitemap


on:
  push:
    branches: [main]

permissions:
  contents: write   # <-- required for pushing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sitemap (your own script)
        run: |
          # Replace this with your sitemap generation command
          echo "Generating sitemap.xml..." > sitemap.xml

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "Update sitemap"
          git push
        env:
          # The remote URL is set via the checkout action, but we need to re-authenticate
          # Actually the checkout@v4 already checks out with the token, but the push may still fail.
          # The safest is to set the remote explicitly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}