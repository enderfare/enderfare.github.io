name: Update repo data

on:
  schedule:
    # Run daily at 5am
    - cron: '0 5 * * *'
  workflow_dispatch:   # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch GitHub repositories
        run: |
          # Write a script to fetch repos and output to a JSON file
          curl -s "https://api.github.com/users/EnderFare/repos?sort=updated&per_page=100" > data/repos.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          git diff --staged --quiet || git commit -m "Update repo data from GitHub API"
          git push