name: Update repo data

on:
  schedule:
    # Run daily at 5am
    - cron: '0 5 * * *'
  workflow_dispatch:   # allow manual trigger

# ✅ Grant write permissions to push commits
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create data directory (if missing)
        run: mkdir -p data

      - name: Fetch GitHub repositories
        run: |
          # Use the built-in GITHUB_TOKEN for authentication (higher rate limit)
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               "https://api.github.com/users/EnderFare/repos?sort=updated&per_page=100" \
               > data/repos.json

      - name: Commit and push updated data
        run: |
          # Set up git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Re-authenticate the remote URL using the token
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Add and commit only if there are changes
          git add data/repos.json
          git diff --staged --quiet || git commit -m "Update repo data from GitHub API [skip ci]"
          
          # Push
          git push