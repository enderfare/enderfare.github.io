<h1>Chapter 3: The Awakening</h1>

<p>She opened her eyes to a world she no longer recognized.</p>

<p>The sky was <b>purple</b>, and the ground <i>hummed</i> with energy.</p>

<ul>
    <li>Her hands were glowing.</li>
    <li>Her memory was blank.</li>
    <li>Her only clue: a <a href="#">strange symbol</a> on her wrist.</li>
</ul>

<blockquote>
    "Some things are better left forgotten."
</blockquote>
